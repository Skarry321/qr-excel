<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QR-Excel">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4361ee">
<title>QR → Excel</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;color:#1c1c1e;padding:0 16px 24px;max-width:480px;margin:0 auto}
h1{font-size:24px;padding:16px 0 2px;text-align:center;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin:4px 0;color:#fff}
.btn:active{opacity:.6}
.btn-primary{background:#4361ee}
.btn-success{background:#34c759}
.btn-danger{background:#ff3b30}
.btn-gray{background:#f2f2f7;color:#1c1c1e}
.scanner-wrap{position:relative;width:100%;aspect-ratio:1/1;max-height:360px;overflow:hidden;border-radius:14px;background:#000;display:none}
.scanner-wrap.active{display:block}
#reader video{border-radius:14px;width:100%!important;height:auto!important}
#reader{width:100%!important;min-height:auto!important}
#reader__scan_region{min-height:auto!important}
#reader__dashboard_section{display:none}
.field{width:100%;padding:12px;border:2px solid #e5e5ea;border-radius:12px;font-size:15px;outline:none;margin:4px 0;background:#f9f9f9}
.field:focus{border-color:#4361ee}
.preview{background:#f2f2f7;border-radius:12px;padding:10px;margin:4px 0;font-size:13px;line-height:1.7}
.preview strong{color:#4361ee}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 6px;text-align:left;border-bottom:1px solid #f2f2f7}
th{font-size:10px;color:#8e8e93;background:#fafafa}
.table-wrap{max-height:240px;overflow-y:auto;border-radius:12px;border:1px solid #f2f2f7}
.empty{padding:24px;text-align:center;color:#aeaeb2}
.hidden{display:none!important}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.del-btn{padding:4px 8px;border:none;border-radius:6px;background:#ff3b30;color:#fff;cursor:pointer;font-size:11px;font-weight:600}
.link-box{background:#f0f7ff;border:2px dashed #4361ee;border-radius:12px;padding:14px;margin:8px 0;text-align:center;word-break:break-all}
.link-box .url{font-size:14px;color:#4361ee;font-weight:600;margin:6px 0}
.link-box .hint{font-size:11px;color:#8e8e93;margin-top:4px}
iframe{display:none}
</style>
</head>
<body>

<h1>QR → Excel</h1>

<div class="card">
  <button class="btn btn-primary" id="btnScan">Сканировать чек</button>
  <div class="scanner-wrap" id="scannerWrap">
    <div id="reader"></div>
    <p class="status" id="scanStatus">Наведите камеру на QR-код</p>
    <button class="btn btn-gray" id="btnStop">Закрыть</button>
  </div>
</div>

<div class="card hidden" id="resultCard">
  <div class="preview" id="preview"></div>
  <label style="font-size:13px;color:#8e8e93;margin:6px 0 3px">Наименование товара</label>
  <input class="field" id="fieldProduct" placeholder="Например: Молоко..." autocomplete="off">
  <button class="btn btn-success" id="btnSave">Сохранить</button>
  <button class="btn btn-gray" id="btnSkip">Без названия</button>
  <button class="btn btn-gray" id="btnCancel">Отмена</button>
</div>

<div class="card">
  <div class="table-wrap">
    <table><thead><tr><th>#</th><th>Дата</th><th>Товар</th><th>Сумма</th><th></th></tr></thead>
    <tbody id="tbody"></tbody></table>
    <div class="empty" id="emptyMsg">Нет записей</div>
  </div>
  <div id="actions" class="hidden" style="margin-top:8px">
    <button class="btn btn-success" id="btnUpload">Загрузить на dropmefiles</button>
    <button class="btn btn-primary" id="btnDL">Скачать .xlsx</button>
    <button class="btn btn-danger" id="btnClear">Очистить</button>
  </div>
</div>

<iframe id="uploadFrame" name="uploadFrame"></iframe>

<div class="card hidden" id="linkCard">
  <p style="font-weight:600;margin-bottom:6px">Файл загружен!</p>
  <div class="link-box">
    <div class="url" id="fileLink">—</div>
    <div class="hint">Откройте эту ссылку на ПК или вставьте в qr-excel.exe</div>
  </div>
  <button class="btn btn-gray" id="btnCopyLink">Копировать ссылку</button>
  <button class="btn btn-gray" id="btnCloseLink">Закрыть</button>
  <div class="status" id="uploadStatus"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var entries=JSON.parse(localStorage.getItem('q')||'[]');
var qr=null,scanning=false,lastData=null,tt=null;

function $(i){return document.getElementById(i)}
function tm(m,e){clearTimeout(tt);var t=$('toast');t.textContent=m;t.style.background=e?'#ff3b30':'#1c1c1e';t.classList.add('show');tt=setTimeout(function(){t.classList.remove('show')},3000)}
function pr(t){var d={date:'',sum:'',num:''};try{var p=t.startsWith('http')?new URL(t).searchParams:new URLSearchParams(t);d.num=p.get('i')||p.get('fd')||'';d.sum=p.get('s')||'';var v=p.get('t')||'';if(v){var m=v.match(/^(\d{4})(\d{2})(\d{2})/);if(m)d.date=m[3]+'.'+m[2]+'.'+m[1]}}catch(e){}return d}
function xl(){var wb=XLSX.utils.book_new();var d=[['N','Дата','Наименование','Сумма']];entries.forEach(function(e,i){d.push([i+1,e.date||'',e.product||'',e.sum||''])});var ws=XLSX.utils.aoa_to_sheet(d);ws['!cols']=[{w:5},{w:14},{w:30},{w:12}];XLSX.utils.book_append_sheet(wb,ws,'Чеки');var out=XLSX.write(wb,{bookType:'xlsx',type:'array'});return new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})}

async function sc(){
  if(scanning)return;
  $('scannerWrap').classList.add('active');
  $('scanStatus').textContent='Загрузка...';
  try{
    qr=new Html5Qrcode("reader");
    await qr.start({facingMode:"environment"},{fps:10,qrbox:{width:250,height:250}},
      function(t){if(scanning){scanning=false;sp();sr(t)}},function(){});
    scanning=true;$('scanStatus').textContent='Наведите камеру на QR-код чека'
  }catch(e){$('scanStatus').textContent='Ошибка: '+e.message;setTimeout(function(){$('scannerWrap').classList.remove('active')},2000)}
}
function sp(){if(qr){try{qr.stop();qr.clear()}catch(e){}qr=null}scanning=false;$('scannerWrap').classList.remove('active')}
function sr(r){lastData=pr(r);$('preview').innerHTML='<strong>Дата:</strong> '+(lastData.date||'—')+'<br><strong>Сумма:</strong> '+(lastData.sum||'—')+'<br><strong>Номер:</strong> '+(lastData.num||'—');$('fieldProduct').value='';$('resultCard').classList.remove('hidden');setTimeout(function(){$('fieldProduct').focus()},300)}
function ad(p){if(!lastData)return null;var e={date:lastData.date,sum:lastData.sum,number:lastData.num,product:p||''};entries.push(e);localStorage.setItem('q',JSON.stringify(entries));rt();return e}
$('btnSave').onclick=function(){if(ad($('fieldProduct').value.trim())){tm('Сохранено');$('resultCard').classList.add('hidden');lastData=null}};
$('btnSkip').onclick=function(){if(ad('')){tm('Сохранено');$('resultCard').classList.add('hidden');lastData=null}};
$('btnCancel').onclick=function(){$('resultCard').classList.add('hidden');lastData=null};
$('btnScan').onclick=sc;$('btnStop').onclick=sp;

function rt(){
  var tb=$('tbody'),em=$('emptyMsg'),ac=$('actions');
  tb.innerHTML='';
  if(!entries.length){em.classList.remove('hidden');ac.classList.add('hidden');return}
  em.classList.add('hidden');ac.classList.remove('hidden');
  entries.forEach(function(e,i){
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+(i+1)+'</td><td>'+(e.date||'—')+'</td><td>'+(e.product||'—')+'</td><td>'+(e.sum||'—')+'</td><td><button class="del-btn" data-i="'+i+'">X</button></td>';
    tb.appendChild(tr)
  });
  tb.querySelectorAll('.del-btn').forEach(function(b){
    b.onclick=function(){entries.splice(+this.dataset.i,1);localStorage.setItem('q',JSON.stringify(entries));rt()}
  })
}

$('btnDL').onclick=function(){
  if(!entries.length){tm('Нет записей',1);return}
  var b=xl();var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='cheki.xlsx';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);tm('Файл скачан')
};

$('btnUpload').onclick=function(){
  if(!entries.length){tm('Нет записей',1);return}
  var btn=this;btn.disabled=true;btn.textContent='Загрузка...';
  
  // Создаём .xlsx blob
  var blob=xl();
  var file=new File([blob],'cheki.xlsx',{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  
  // Пробуем через fetch (если CORS поддерживается)
  var fd=new FormData();
  fd.append('file',file);
  
  var apiUrl='https://dropmefiles.com/upload';
  
  fetch(apiUrl,{method:'POST',body:fd})
  .then(function(r){
    // Пытаемся получить URL из ответа
    var url=r.url; // итоговый URL после редиректов
    if(url && url!==apiUrl){
      showLink(url);btn.disabled=false;btn.textContent='Загрузить на dropmefiles';
    } else {
      return r.text().then(function(t){
        // Ищем ссылку в тексте ответа
        var m=t.match(/https?:\/\/dropmefiles\.com\/[a-zA-Z0-9]+/);
        if(m){showLink(m[0]);btn.disabled=false;btn.textContent='Загрузить на dropmefiles'}
        else throw new Error('Не удалось получить ссылку')
      });
    }
  })
  .catch(function(e){
    // Если CORS не работает - показываем инструкцию
    $('uploadStatus').textContent='Браузер не может загрузить напрямую. Сохраните файл и загрузите вручную на dropmefiles.com';
    $('uploadStatus').style.color='#991b1b';
    btn.disabled=false;btn.textContent='Загрузить на dropmefiles'
  });
};

function showLink(url){
  $('fileLink').textContent=url;
  $('linkCard').classList.remove('hidden');
  $('uploadStatus').textContent='';
}

$('btnCopyLink').onclick=function(){
  var url=$('fileLink').textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(url);tm('Ссылка скопирована')}
  else{tm('Выделите и скопируйте ссылку')}
};
$('btnCloseLink').onclick=function(){$('linkCard').classList.add('hidden')};
$('btnClear').onclick=function(){if(!confirm('Удалить всё?'))return;entries=[];localStorage.setItem('q','[]');rt();tm('Очищено')};
rt();
</script>
</body>
</html>
